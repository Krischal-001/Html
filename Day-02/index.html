<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <body>
<div class="layout">

    <header class="header">Header</header>

    <div class="main">
        <div class="left">
            <div class="table-container">
                <table>
                    <caption><b>Student Report Table</b></caption>

                    <thead>
                        <tr>
                            <th rowspan="2">Student Info</th>
                            <th colspan="2">Subjects</th>
                            <th rowspan="2">Remarks</th>
                        </tr>
                        <tr>
                            <th>Math</th>
                            <th>Science</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>John Doe</td>
                            <td>85</td>
                            <td>90</td>
                            <td>Excellent</td>
                        </tr>
                        <tr>
                            <td>Jane Smith</td>
                            <td>78</td>
                            <td>88</td>
                            <td>Good</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="right">
            <div class="grid-container">
                <div class="box">1</div>
                <div class="box">2</div>
                <div class="box">3</div>
                <div class="box">4</div>
                <div class="box">5</div>
                <div class="box">6</div>
            </div>
        </div>
    </div>

    <footer class="footer">Footer</footer>

</div>
</body>
  
</body>
</html>
